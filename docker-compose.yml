services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: lifelist-tailscale
    hostname: lifelist
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.conf
      - TS_USERSPACE=false
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./tailscale:/config:ro
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  app:
    build: .
    container_name: lifelist-app
    network_mode: "service:tailscale"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DB=${MONGODB_DB:-lifelist}
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      - tailscale
    restart: unless-stopped

volumes:
  tailscale-state:
