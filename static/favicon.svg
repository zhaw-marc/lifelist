<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#1a5c38"/>
  <!-- Bird silhouette (stylised passerine, facing right) -->
  <!-- Body -->
  <ellipse cx="15" cy="18" rx="6" ry="4" fill="#f0f0e8"/>
  <!-- Head -->
  <circle cx="21" cy="14" r="3.5" fill="#f0f0e8"/>
  <!-- Beak -->
  <polygon points="24.5,13.5 28,14 24.5,14.5" fill="#e8a020"/>
  <!-- Eye -->
  <circle cx="22" cy="13.5" r="0.9" fill="#1a1a1a"/>
  <!-- Tail -->
  <polygon points="9,18 7,16 9,20 11,21" fill="#d0d0c8"/>
  <!-- Wing hint -->
  <ellipse cx="15" cy="17" rx="4.5" ry="2" fill="#c8c8b8"/>
  <!-- Legs -->
  <line x1="15" y1="22" x2="14" y2="25" stroke="#e8a020" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="17" y1="22" x2="18" y2="25" stroke="#e8a020" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Feet -->
  <line x1="14" y1="25" x2="12" y2="26" stroke="#e8a020" stroke-width="1" stroke-linecap="round"/>
  <line x1="14" y1="25" x2="15.5" y2="26.5" stroke="#e8a020" stroke-width="1" stroke-linecap="round"/>
  <line x1="18" y1="25" x2="16.5" y2="26.5" stroke="#e8a020" stroke-width="1" stroke-linecap="round"/>
  <line x1="18" y1="25" x2="19.5" y2="26" stroke="#e8a020" stroke-width="1" stroke-linecap="round"/>
</svg>
